<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文學靈魂棲息地</title>
    <style>
        :root {
            --bg-base: #0f172a; /* 深邃藍黑底色 */
            --glass-bg: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #e2e8f0;
        }

        body {
            font-family: "PingFang SC", "Noto Serif SC", "STSong", "Songti SC", serif;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #app {
            width: 90%;
            max-width: 550px;
            padding: 40px 0;
            z-index: 10;
        }

        /* 磨砂玻璃卡片 */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 45px 35px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .title {
            font-size: 14px;
            text-align: center;
            letter-spacing: 6px;
            margin-bottom: 30px;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .question-text {
            font-size: 20px;
            line-height: 1.7;
            margin-bottom: 40px;
            font-weight: 300;
            text-align: justify;
        }

        /* 現代感膠囊按鈕 */
        .options-list { display: flex; flex-direction: column; gap: 16px; }

        .option-btn {
            display: block;
            width: 100%;
            padding: 18px 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 100px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-main);
            cursor: pointer;
            font-size: 16px;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            text-align: left;
            line-height: 1.4;
        }

        .option-btn:hover {
            background: rgba(255, 255, 255, 0.95);
            color: #0f172a;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.3);
            transform: scale(1.02);
            border-color: transparent;
        }

        /* 結果頁動畫與樣式 */
        #result-container { display: none; animation: fadeIn 1.2s ease; }

        .writer-title { 
            font-size: 38px; 
            font-weight: 600; 
            letter-spacing: 10px; 
            margin: 10px 0; 
            text-align: center;
            background: linear-gradient(to bottom, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .res-sub { 
            text-align: center; 
            color: var(--text-dim); 
            margin-bottom: 40px; 
            letter-spacing: 3px;
            font-size: 15px;
        }

        .portrait-text { 
            font-size: 16px; 
            line-height: 2.2; 
            text-align: justify; 
            margin: 30px 0;
            white-space: pre-wrap;
            color: rgba(248, 250, 252, 0.9);
        }

        .golden-sentence { 
            font-size: 22px; 
            font-weight: 500; 
            margin: 50px 0; 
            padding-left: 20px;
            border-left: 3px solid #fff;
            font-style: italic;
        }

        .res-work { 
            text-align: right; 
            font-size: 14px; 
            color: var(--text-dim); 
            margin-top: 20px;
        }

        .footer-area {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .xhs-qr { 
            width: 70px; 
            height: 70px; 
            border-radius: 12px; 
            opacity: 0.8;
            filter: grayscale(0.5);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

<div id="app">
    <div id="quiz-container">
        <div class="title">Literary Soul Habitat</div>
        <div class="card">
            <div id="q-text" class="question-text">載入靈魂索引中...</div>
            <div id="options-container" class="options-list"></div>
        </div>
    </div>

    <div id="result-container">
        <div class="card">
            <div class="writer-title" id="res-title"></div>
            <div class="res-sub" id="res-sub"></div>
            <div id="res-portrait" class="portrait-text"></div>
            <div id="res-golden" class="golden-sentence"></div>
            <div id="res-work" class="res-work"></div>
            
            <div class="footer-area">
                <div style="font-size:11px; color:var(--text-dim); line-height:1.8;">
                    《文學人格側寫》報告<br>在星雲深處，遇見共鳴的靈魂
                </div>
                <img src="qrcode.jpg" class="xhs-qr" alt="QR">
            </div>
        </div>
    </div>
</div>

<script>
// 作家數據 (完整保留)
const WRITERS = {
    "汪曾祺": { name: "人間煙火者", work: "《人間草木》", golden: "「一定要愛著點什麼，恰似草木對光陰的鍾情。」", nebula: "radial-gradient(circle at center, #3d4035 0%, #0f172a 100%)", portrait: "你對生活有一支溫潤的感受力。街巷、食物、人情、舊時光——這些細微而平凡的東西，在你眼中都帶著溫度。你相信人生不必轟轟烈烈，只要還有煙火氣，就值得慢慢生活。" },
    "三毛": { name: "遠方旅人", work: "《撒哈拉的故事》", golden: "「心若沒有棲息的地方，到哪裡都是流浪。」", nebula: "radial-gradient(circle at center, #5d4037 0%, #1a1a1a 100%)", portrait: "你天生對世界充滿好奇。人生不是一條既定的道路，而是一場不斷展開的遠行。你的靈魂像風一樣自由、熱烈、永遠在路上。" },
    "張愛玲": { name: "月光洞察者", work: "《傾城之戀》", golden: "「因為懂得，所以慈悲。」", nebula: "radial-gradient(circle at center, #334155 0%, #0f172a 100%)", portrait: "你對人性的觀察細致而冷靜。在人世的燈火中洞察複雜與微妙。這種敏銳讓你既清醒，也深情。" },
    "海子": { name: "麥田詩人", work: "《海子的詩》", golden: "「天空一無所有，為何給我安慰。」", nebula: "radial-gradient(circle at center, #451a03 0%, #0f172a 100%)", portrait: "你的靈魂像一片遼闊的原野。你相信詩意存在於一切事物之中：天空、河流、遠方，以及人心。情感比語言更遼闊。" },
    "林清玄": { name: "清歡生活家", work: "《人生最美是清歡》", golden: "「以清淨心看世界，以歡喜心過生活。」", nebula: "radial-gradient(circle at center, #2d312d 0%, #0f172a 100%)", portrait: "你擁有一種柔軟而清明的內心。你習慣從日常生活的小事裡體會人生的智慧。你的氣質像清晨的空氣——溫和、寧靜。" },
    "史鐵生": { name: "溫柔哲人", work: "《我與地壇》", golden: "「死是一件不必急於求成的事。」", nebula: "radial-gradient(circle at center, #1e293b 0%, #020617 100%)", portrait: "你對生命有一種深沉的理解。你知道命運有時會殘酷，但人依然可以溫柔地活著。你的精神像一座安靜的庭院。" },
    "黑塞": { name: "自我覺醒者", work: "《悉達多》", golden: "「每個人的生命都是通向自己的旅程。」", nebula: "radial-gradient(circle at center, #2e1065 0%, #0f172a 100%)", portrait: "你的一生像一段尋找自我的旅程。成長對你來說不是年齡的變化，而是一場又一場的精神覺醒。" },
    "加謬": { name: "荒誕見證者", work: "《局外人》", golden: "「在隆冬，我終於知道，我身上有一個不可戰勝的夏天。」", nebula: "radial-gradient(circle at center, #0f172a 0%, #000 100%)", portrait: "你清醒地知道世界並不完美。你不逃避荒誕，而是在其中尋找勇氣。你的精神是一種安靜而堅定的反抗。" },
    "卡夫卡": { name: "迷宮思考者", work: "《變形記》", golden: "「我和世界之間隔著一層透明的牆。」", nebula: "radial-gradient(circle at center, #334155 0%, #020617 100%)", portrait: "你對世界的感受常常帶著一點疏離。現實像一座複雜的迷宮，而你總能看見深處隱秘的結構。" },
    "王小波": { name: "自由思想家", work: "《黃金時代》", golden: "「人的一切痛苦，本質上都是對自己無能的憤怒。」", nebula: "radial-gradient(circle at center, #1e1b4b 0%, #0f172a 100%)", portrait: "你擁有獨立而鋒利的思維。幽默和理性是你的武器。即使面對荒誕的世界，你也能保持清醒和自由。" },
    "村上春樹": { name: "孤獨漫遊者", work: "《海邊的卡夫卡》", golden: "「當你穿過了暴風雨，你就不再是原來那個人。」", nebula: "radial-gradient(circle at center, #164e63 0%, #0f172a 100%)", portrait: "你並不害怕孤獨。在獨處的時候，你更容易聽見自己的聲音。現實在你眼中總帶著一點夢境感。" },
    "托爾斯泰": { name: "靈魂史詩者", work: "《戰爭與和平》", golden: "「人生的一切變化，是由光明和陰影構成的。」", nebula: "radial-gradient(circle at center, #422006 0%, #0f172a 100%)", portrait: "你習慣在宏大的世界中思考人生。家庭、歷史、社會——這些複雜關係在你眼中交織成了一部史詩。" },
    "陀思妥耶夫斯基": { name: "深淵探索者", work: "《罪與罰》", golden: "「人性並不簡單，每個人都在掙扎與尋找之中生活。」", nebula: "radial-gradient(circle at center, #020617 0%, #000 100%)", portrait: "你對靈魂深處的問題非常敏感。你知道人性並不簡單，每個人都在尋找生命真正的救贖與意義。" },
    "簡媜": { name: "山海書寫者", work: "《水問》", golden: "「文字可以療癒心靈，世界始終保留著溫柔的一面。」", nebula: "radial-gradient(circle at center, #064e3b 0%, #0f172a 100%)", portrait: "你對自然與生命有細膩的感受。你的氣質像山間清晨：寧靜、明亮、充滿呼吸感。" },
    "杜拉斯": { name: "愛欲敘事者", work: "《情人》", golden: "「愛之於我，不是肌膚之親，不是一蔬一飯。」", nebula: "radial-gradient(circle at center, #4c1d95 0%, #0f172a 100%)", portrait: "你對情感的感知極其敏銳。你的人生像一段緩慢流動的敘事——安靜、迷人，又充滿深情。" },
    "伍爾夫": { name: "意識漫遊者", work: "《一間自己的房間》", golden: "「生活不是一系列燈塔，而是一圈光暈。」", nebula: "radial-gradient(circle at center, #1e1b4b 0%, #0f172a 100%)", portrait: "你的意識像海潮一樣流動。你對時間、記憶與情緒有著獨特的感知。內心深邃、細膩，又充滿回聲。" }
};

// 完整的 20 道題目 (保持不變)
const QUESTIONS = [
    { q: "1. 假如你是世界起始的一段文字，你希望自己被書寫在：", writers: ["汪曾祺","三毛","王小波","卡夫卡"], texts: ["泛黃的家譜或一卷略帶煙火氣的菜譜上", "一張被風吹向遠方的空白信箋上", "手術刀般鋒利的觀察筆記裡", "幽深迷宮轉角處的一面石牆上"] },
    { q: "2. 凌晨三點，你突然醒來，窗外寂靜無聲。那一刻你感覺：", writers: ["林清玄","杜拉斯","村上春樹","黑塞"], texts: ["萬物皆在夢中，這種平凡的寧靜真好", "想要立刻推門而出，去看看深夜的街道", "世界像是一場荒謬的電影，而我是唯一的觀眾", "感到一種巨大的虛無，仿佛自己被世界遺忘了"] },
    { q: "3. 面對「遺憾」這個詞，你的底色更傾向於：", writers: ["簡媜","海子","張愛玲","史鐵生"], texts: ["隨風而去，人生最美是清歡", "是一次未完成的流浪，帶著未竟的熾熱", "是一道清醒的裂痕，因為懂得，所以慈悲", "是一場漫長的救贖，死是一件不必急於求成的事"] },
    { q: "4. 哪種色彩組合最能代表你內心的審美傾向？", writers: ["汪曾祺","海子","張愛玲","加謬"], texts: ["嫩綠與米白，像清晨草木對光陰的鍾情", "金色麥浪與透明的藍天，純粹而遼闊", "冷峻的灰與透徹的紫，帶著高級的疏離", "深邃的墨黑與一抹堅韌的微光，在荒誕中尋勇氣"] },
    { q: "5. 在人際關係的「迷宮」裡，你通常扮演：", writers: ["林清玄","三毛","張愛玲","陀思妥耶夫斯基"], texts: ["溫潤的協調者，愛著點什麼", "自由的遊走者，到哪裡都是流浪", "冷靜的旁觀者，洞察複雜與微妙", "沉靜的思考者，在孤獨中尋找旅程"] },
    { q: "6. 如果你有一間「自己的房間」，你最希望窗戶正對著：", writers: ["汪曾祺","三毛","村上春樹","伍爾夫"], texts: ["充滿生活氣息的街巷、老樹和飛鳥", "廣袤無垠、風暴漫天的撒哈拉或原野", "繁華卻又透著冷漠感的都市流光", "一片深邃、充滿回聲的海"] },
    { q: "7. 面對生活中的「無意義」和「瑣碎」，你會：", writers: ["林清玄","杜拉斯","王小波","卡夫卡"], texts: ["以清淨心看世界，在簡單相遇中生出情味", "想要打破這種沉悶，追求一種極致體驗", "用幽默和理性解構它，認為痛苦源於無能", "覺得現實隔著牆，在困惑中尋找答案"] },
    { q: "8. 哪種嗅覺記憶最能喚起你的情感？", writers: ["汪曾祺","三毛","張愛玲","黑塞"], texts: ["剛煮好的米飯香氣，或是草木清香", "乾燥的沙漠風味，或是遠方的塵土感", "考究的香水余味，或是舊書頁墨香", "帶有濕氣的泥土味，或是森林冷冽"] },
    { q: "9. 你如何看待「時間」的流逝？", writers: ["托爾斯泰","三毛","王小波","伍爾夫"], texts: ["時間是溫柔的，它讓一切變化構成了美", "時間是自由的，它見證了每一場遠行", "時間是清醒的，它剝離了華麗留下真相", "時間是流動的光暈，像海潮包裹著記憶"] },
    { q: "10. 當你遇到讓你心動的事物，你通常會：", writers: ["簡媜","杜拉斯","張愛玲","陀思妥耶夫斯基"], texts: ["安靜地欣賞，以歡喜心過生活", "熱烈地追求，不顧一切地想要交融", "隔著距離端詳，享受那種微妙張力", "陷入長久沉思，理解它背後的命運意義"] },
    { q: "11. 你的精神世界「違禁詞」是：", writers: ["林清玄","海子","王小波","史鐵生"], texts: ["喧囂", "停滯", "盲從", "淺薄"] },
    { q: "12. 假設生命是一場敘事，你希望你的敘事風格是：", writers: ["汪曾祺","海子","張愛玲","托爾斯泰"], texts: ["溫潤平淡，如人間草木般自然", "浪漫純粹，如詩歌般熾熱遼闊", "冷峻細緻，如傾城之戀般透徹", "深沉厚重，如史詩般交織光明與陰影"] },
    { q: "13. 精神疲憊時，哪種方式能真正治癒你？", writers: ["汪曾祺","三毛","王小波","黑塞"], texts: ["整理房間、做頓飯，感受細微溫度", "獨去陌生地方，哪怕只是坐在長椅上", "寫一段文字解構情緒", "讀關於自我覺醒的书，在文字裡重塑自己"] },
    { q: "14. 如果把靈魂比作自然元素，你覺得是：", writers: ["簡媜","海子","村上春樹","陀思妥耶夫斯基"], texts: ["滋養萬物的細雨或和煦晨光", "掠過麥田的風或燃燒的火焰", "月光下清冷的鏡面或鋒利冰層", "深埋地下的礦石或緩慢流淌的深泉"] },
    { q: "15. 對於「成功」，你內心最真實的看法是：", writers: ["林清玄","杜拉斯","王小波","史鐵生"], texts: ["能平安、清淨、有情味地度過一生", "走過足夠多地方，擁有足夠多真實體驗", "保持思維獨立自由，沒被愚蠢吞噬", "穿過暴風雨後，認出了那個真正的自己"] },
    { q: "16. 觀察路邊的老建築，你首先想到：", writers: ["簡媜","三毛","卡夫卡","托爾斯泰"], texts: ["住過的人家，發生過的平凡故事", "它的歷史感和它曾經通往的遠方", "它在現代都市中的格格不入與荒謬", "它見證的命運輪迴與不可戰勝的時光"] },
    { q: "17. 哪種人際狀態讓你感到最舒適？", writers: ["林清玄","海子","張愛玲","加謬"], texts: ["以平常心相待，如君子之交淡如水", "獨立靈魂，為了愛熱烈相擁", "互相懂得，即便不說話也透著默契", "能在深淵處相逢，共同探討生命意義"] },
    { q: "18. 選擇一種「非人類」的存在方式：", writers: ["簡媜","三毛","村上春樹","伍爾夫"], texts: ["一株靜默生長、鍾情於光陰的草木", "一隻自由飛翔、沒有棲息地的候鳥", "一面映照出世間複雜慾望的冷鏡", "一個永恆流轉、承載萬物呼吸的海洋"] },
    { q: "19. 面對世界的「不完美」，你的姿態是：", writers: ["史鐵生","杜拉斯","王小波","加謬"], texts: ["溫柔地活著，尋找生活的小確幸", "離開這裡，去尋找心中的那片淨土", "帶著諷刺的微笑，清醒地揭穿它", "保持安靜堅定的反抗，守護內心的夏天"] },
    { q: "20. 總結你的靈魂傾向，它棲息在：", writers: ["林清玄","海子","村上春樹","托爾斯泰"], texts: ["充滿了清歡、煙火與平常心的山間街巷", "遼闊的麥田、熱烈的遠方與燃燒詩行裡", "清醒月光下、獨立高台或疏離街道旁", "自我的旅程中、深邃庭院或思考迷宮中"] }
];

let step = 0;
let scores = {};
Object.keys(WRITERS).forEach(w => scores[w] = 0);

function showQuestion() {
    if(step >= QUESTIONS.length) {
        showResult();
        return;
    }
    const qData = QUESTIONS[step];
    document.getElementById('q-text').innerText = qData.q;
    const container = document.getElementById('options-container');
    container.innerHTML = "";
    qData.texts.forEach((txt, i) => {
        const btn = document.createElement('button');
        btn.className = "option-btn";
        btn.innerText = txt;
        btn.onclick = () => {
            scores[qData.writers[i]]++;
            step++;
            showQuestion();
        };
        container.appendChild(btn);
    });
}

function showResult() {
    let sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]);
    const s1 = sorted[0];
    const s2 = sorted[1];
    
    document.getElementById('quiz-container').style.display = 'none';
    document.getElementById('result-container').style.display = 'block';

    // 嚴格計分邏輯
    if(s1[1] <= 2) {
        renderSeeker();
    } else if (s1[1] === s2[1]) {
        renderDual(s1[0], s2[0]);
    } else {
        renderSingle(s1[0]);
    }
}

function renderSingle(name) {
    const data = WRITERS[name];
    document.body.style.background = data.nebula;
    document.getElementById('res-title').innerText = data.name;
    document.getElementById('res-sub').innerText = "原型作家 · " + name;
    document.getElementById('res-portrait').innerText = data.portrait;
    document.getElementById('res-golden').innerText = data.golden;
    document.getElementById('res-work').innerText = "代表作：" + data.work;
}

function renderDual(n1, n2) {
    const d1 = WRITERS[n1];
    const d2 = WRITERS[n2];
    document.body.style.background = d1.nebula;
    document.getElementById('res-title').innerText = "混合靈魂";
    document.getElementById('res-sub').innerText = `${n1} 與 ${n2} 的共鳴`;
    document.getElementById('res-portrait').innerText = `你擁有多重的精神底色。\n\n一方面，${d1.portrait}\n\n另一方面，${d2.portrait}`;
    document.getElementById('res-golden').innerText = `${d1.golden}\n${d2.golden}`;
    document.getElementById('res-work').innerText = `相關作品：${d1.work}、${d2.work}`;
}

function renderSeeker() {
    document.body.style.background = "radial-gradient(circle at center, #1e293b 0%, #0f172a 100%)";
    document.getElementById('res-title').innerText = "未完待續者";
    document.getElementById('res-sub').innerText = "尋路的人";
    document.getElementById('res-portrait').innerText = "你的靈魂是一部長篇史詩，正處於光明與陰影交織的創作初期。你不是被寫就的角色，而是那個正在尋找自我旅程的行者。";
    document.getElementById('res-golden').innerText = "「去尋找吧，你正走在通往自己的路上。」";
}

showQuestion();
</script>
</body>
</html>
