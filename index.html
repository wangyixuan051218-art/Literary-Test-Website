<script>

        "三毛": { name: "遠方旅人", work: "《撒哈拉的故事》", golden: "「心若沒有棲息的地方，到哪裡都是流浪。」", portrait: "你天生對世界充滿好奇。人生不是一條既定的道路，而是一場不斷展開的遠行。你願意走向陌生的地方，也願意遇見不同的人與故事。你的靈魂像風一樣——自由、熱烈、永遠在路上。" },
        "海子": { name: "麥田詩人", work: "《海子的詩》", golden: "「天空一無所有，為何給我安慰。」", portrait: "你的靈魂像一片遼闊的原野。你對世界的感受純粹而熾熱，像陽光、麥田和風。你相信詩意存在於一切事物之中：天空、河流、遠方，以及人心。很多時候，你的情感比語言更遼闊。" },

        "史鐵生": { name: "溫柔哲人", work: "《我與地壇》", golden: "「死是一件不必急於求成的事。」", portrait: "你對生命有一種深沈的理解。你知道命運有時會殘酷，但人依然可以溫柔地活著。在困境中，你習慣尋找意義；在孤獨中，你學會與世界和解。你的精神像一座安靜的庭院：沈靜、堅韌、充滿光。" },
        "黑塞": { name: "自我覺醒者", work: "《悉達多》", golden: "「每個人的生命都是通向自己的旅程。」", portrait: "你的一生像一段尋找自我的旅程。你不滿足於表面的生活，總想理解更深的自己。成長對你來說不是年齡的變化，而是一場又一場的精神覺醒。你相信每個人都必須走向真正的自己。" },

        "王小波": { name: "自由思想家", work: "《黃金時代》", golden: "「人的一切痛苦，本质上都是对自己无能的愤怒。」", portrait: "你擁有獨立而鋒利的思維。你不喜歡被既定規則束縛，也不願輕易接受權威。幽默和理性是你的武器。即使面對荒誕的世界，你也能保持清醒。對你來說，自由不僅是生活方式，更是一種精神態度。" },
        "伍爾夫": { name: "意識漫遊者", work: "《一間自己的房間》", golden: "「生活不是一系列燈塔般對稱的事件，而是一圈光暈。」", portrait: "你的意識像海潮一樣流動。你對時間、記憶與情緒有著獨特的感知。在別人匆忙生活的時候，你常常停下來思考：時間究竟如何流逝，記憶如何改變我們。你的世界是內心的海洋，深邃、細膩，又充滿回聲。" },

        "托爾斯泰": { name: "靈魂史詩者", work: "《戰爭與和平》", golden: "「人生的一切變化，一切魅力，一切美都是由光明和陰影構成的。」", portrait: "你習慣在宏大的世界中思考人生。家庭、歷史、社會、愛情——這些複雜關係在你眼中彼此交織。你相信人並不是孤立存在的，每個人都生活在更廣闊的命運之中。世界在你眼中像一部長篇小說。" },
        "陀思妥耶夫斯基": { name: "深淵探索者", work: "《罪與罰》", golden: "「人性並不簡單，每個人都在掙扎與尋找之中生活。」", portrait: "你對靈魂深處的問題非常敏感。善與惡、罪與救贖，這些問題在你心中始終存在。你知道人性並不簡單，每個人都在掙扎與尋找之中生活。正因為如此，你更渴望理解生命真正的意義。" },

        "杜拉斯": { name: "愛欲敘事者", work: "《情人》", golden: "「愛之於我，不是肌膚之親，不是一蔬一飯。」", portrait: "你對情感的感知極其敏銳。你知道愛情從來不是簡單的甜蜜，它往往帶著記憶、欲望與時間的影子。你的人生像一段緩慢流動的敘事——安靜、迷人，又充滿深情。" }
    };

        container.innerHTML = "";
        
        ['A','B','C','D'].forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = "option-btn";
            btn.innerText = qData.texts[index];
            btn.onclick = () => {
                const targetWriter = qData.options[opt];
                scores[targetWriter]++;
                currentStep++;
                showQuestion();
            };
            container.appendChild(btn);
        });
    }

    function calculateAndShowResult() {
        let sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
        const s1 = sorted[0]; // [name, score]
        const s2 = sorted[1];

        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('result-container').style.display = 'block';

        // 判定算法 
        if (s1[1] <= 3) {
            // 未完待續者 [cite: 60-63]
            renderSeeker();
        } else if (s1[1] - s2[1] <= 1) {
            // 多重人格者 [cite: 57-59]
            renderDualSoul(s1[0], s2[0]);
        } else {
            // 常規結果 [cite: 54-56]
            renderSingleSoul(s1[0]);
        }
    }

    function renderSingleSoul(writer) {
        const data = WRITERS_DATA[writer];
        document.body.style.backgroundColor = NEBULA_STYLE[writer] || "#F5F5DC";
        document.getElementById('res-title').innerText = data.name;
        document.getElementById('res-sub').innerText = `原型作家 · ${writer}`;
        document.getElementById('res-portrait').innerText = data.portrait;
        document.getElementById('res-golden').innerText = data.golden;
        document.getElementById('res-work').innerText = `代表作：${data.work}`;
    }

    function renderDualSoul(w1, w2) {
        const d1 = WRITERS_DATA[w1];
        const d2 = WRITERS_DATA[w2];
        document.body.style.backgroundColor = NEBULA_STYLE[w1] || "#F5F5DC";
        document.getElementById('res-title').innerText = "多重人格者";
        document.getElementById('res-sub').innerText = `${w1} 與 ${w2} 的共生靈魂`;
        document.getElementById('res-portrait').innerText = `${d1.portrait}\n\n同時，${d2.portrait}`;
        document.getElementById('res-golden').innerText = `${d1.golden}\n${d2.golden}`;
        document.getElementById('res-work').innerText = `相關作品：${d1.work}、${d2.work}`;
    }

    function renderSeeker() {
        document.body.style.background = "linear-gradient(45deg, #F5F5DC, #FDF5E6, #ECEFF1, #DCDCDC)";
        document.getElementById('res-title').innerText = "未完待續者";
        document.getElementById('res-sub').innerText = "尋找旅程的行者";
        document.getElementById('res-portrait').innerText = "你的靈魂是一部長篇史詩，正處於光明與陰影交織的創作初期。你不是被寫就的角色，而是那個正在尋找自我旅程的行者。";
        document.getElementById('res-golden').innerText = "「去尋找吧，你正走在通往自己的路上。」";
    }

    startQuiz();
</script>
</body>
</html>
