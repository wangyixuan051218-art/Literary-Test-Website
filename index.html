<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>专业人格测评系统</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background-color: #f4f7fb;
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: white;
  width: 90%;
  max-width: 600px;
  padding: 40px;
  border-radius: 18px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.08);
}

h1 {
  text-align: center;
  color: #1a365d;
  margin-bottom: 20px;
}

.progress-bar {
  height: 8px;
  background: #e2e8f0;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 20px;
}

.progress {
  height: 100%;
  width: 0%;
  background: #2b6cb0;
  transition: width 0.3s ease;
}

.question {
  font-size: 18px;
  margin-bottom: 20px;
  color: #2d3748;
}

button {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 10px;
  border: 1px solid #cbd5e0;
  background: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #2b6cb0;
  color: white;
  border-color: #2b6cb0;
}

.result {
  text-align: center;
  font-size: 22px;
  color: #1a365d;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">
  <h1>人格测评</h1>

  <div class="progress-bar">
    <div class="progress" id="progress"></div>
  </div>

  <div id="quiz">
    <div class="question" id="questionText"></div>
    <button onclick="selectAnswer('E')" id="btnA"></button>
    <button onclick="selectAnswer('I')" id="btnB"></button>
  </div>

  <div class="result" id="result"></div>
</div>

<script>
const questions = [
  {
    text: "在聚会中，你更倾向于：",
    A: "主动与很多人交谈",
    B: "与少数熟人深聊"
  },
  {
    text: "周末你更愿意：",
    A: "参加社交活动",
    B: "独处放松"
  },
  {
    text: "做决定时你更依赖：",
    A: "逻辑分析",
    B: "情感感受"
  }
];

let currentQuestion = 0;
let scoreE = 0;
let scoreI = 0;

function loadQuestion(){
  document.getElementById("questionText").innerText = questions[currentQuestion].text;
  document.getElementById("btnA").innerText = questions[currentQuestion].A;
  document.getElementById("btnB").innerText = questions[currentQuestion].B;

  let progressPercent = ((currentQuestion) / questions.length) * 100;
  document.getElementById("progress").style.width = progressPercent + "%";
}

function selectAnswer(type){
  if(type === "E"){
    scoreE++;
  } else {
    scoreI++;
  }

  currentQuestion++;

  if(currentQuestion < questions.length){
    loadQuestion();
  } else {
    showResult();
  }
}

function showResult(){
  document.getElementById("quiz").style.display = "none";
  document.getElementById("progress").style.width = "100%";

  if(scoreE > scoreI){
    document.getElementById("result").innerText = "你的性格偏向：外向型 (E)";
  } else {
    document.getElementById("result").innerText = "你的性格偏向：内向型 (I)";
  }
}

loadQuestion();
</script>

</body>
</html>
